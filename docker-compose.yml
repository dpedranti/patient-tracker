services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: patient_user
      POSTGRES_PASSWORD: patient_pass
      POSTGRES_DB: patient_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U patient_user -d patient_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
