apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-tracker-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: patient-tracker-api
  template:
    metadata:
      labels:
        app: patient-tracker-api
    spec:
      initContainers:
        - name: run-migrations
          image: patient-tracker-api:latest
          imagePullPolicy: Never
          command: ["alembic", "upgrade", "head"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: patient-tracker-secrets
                  key: database-url
      containers:
        - name: api
          image: patient-tracker-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: patient-tracker-secrets
                  key: database-url
            - name: CORS_ORIGINS
              value: "http://localhost"
